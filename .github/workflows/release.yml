name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    env:
      APP_NAME: MontecarloPiEstimator

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          check-latest: true

      - name: Download Dependencies
        run: go mod download

      - name: Install Build Tools
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          go install fyne.io/tools/cmd/fyne@latest

      - name: Build Application
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            GOARCH=${{ matrix.goarch }} fyne package --os darwin --app-id com.example.${{ env.APP_NAME }} --name ${{ env.APP_NAME }} --icon Icon.png
          else
            fyne-cross ${{ matrix.goos }} -arch=${{ matrix.goarch }} -app-id com.example.${{ env.APP_NAME }} -name ${{ env.APP_NAME }} -icon Icon.png
          fi

      - name: Package Artifacts
        shell: bash
        run: |
          ARCHIVE_BASE="${APP_NAME}-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            BUNDLE_NAME="${APP_NAME}.app"
            ARCHIVE_NAME="${ARCHIVE_BASE}.tar.gz"
            tar -czvf "${ARCHIVE_NAME}" "$BUNDLE_NAME"
            echo "ARCHIVE_PATH=$(pwd)/$ARCHIVE_NAME" >> $GITHUB_ENV
          
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            SOURCE_FILE="fyne-cross/dist/${{ matrix.goos }}-${{ matrix.goarch }}/${APP_NAME}.zip"
            ARCHIVE_NAME="${ARCHIVE_BASE}.zip"
            mv "$SOURCE_FILE" "$ARCHIVE_NAME"
            echo "ARCHIVE_PATH=$(pwd)/$ARCHIVE_NAME" >> $GITHUB_ENV
          
          else
            SOURCE_FILE="fyne-cross/dist/${{ matrix.goos }}-${{ matrix.goarch }}/${APP_NAME}.tar.xz"
            ARCHIVE_NAME="${ARCHIVE_BASE}.tar.xz"
            mv "$SOURCE_FILE" "$ARCHIVE_NAME"
            echo "ARCHIVE_PATH=$(pwd)/$ARCHIVE_NAME" >> $GITHUB_ENV
          fi

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true