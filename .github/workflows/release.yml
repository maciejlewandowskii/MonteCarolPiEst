name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    env:
      APP_NAME: MontecarloPiEstimator

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Download Dependencies
        run: go mod download

      - name: Install Build Tools
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build and Package
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            echo "Building native macOS bundle for ${{ matrix.goarch }}..."
            GOARCH=${{ matrix.goarch }} fyne package -os darwin -appID com.example.${{ env.APP_NAME }} -name ${{ env.APP_NAME }}
          
            BUNDLE_NAME="${APP_NAME}.app"
            ARCHIVE_NAME="${APP_NAME}-${{ github.ref_name }}-darwin-${{ matrix.goarch }}.tar.gz"
            tar -czvf "${ARCHIVE_NAME}" "$BUNDLE_NAME"
          
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}" >> $GITHUB_ENV
          else
            echo "Building with Docker (fyne-cross) for ${{ matrix.goos }}/${{ matrix.goarch }}..."
            fyne-cross ${{ matrix.goos }} -arch=${{ matrix.goarch }} -app-id com.example.${{ env.APP_NAME }} -name ${{ env.APP_NAME }}
          
            # Navigate into the output directory
            cd fyne-cross/bin/${{ matrix.goos }}-${{ matrix.goarch }}
            ARCHIVE_BASE="${APP_NAME}-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
            if [ "${{ matrix.goos }}" = "windows" ]; then
              BINARY_NAME="${APP_NAME}.exe"
              ARCHIVE_NAME="${ARCHIVE_BASE}.zip"
              zip "${ARCHIVE_NAME}" "$BINARY_NAME"
            else
              BINARY_NAME="${APP_NAME}"
              ARCHIVE_NAME="${ARCHIVE_BASE}.tar.gz"
              tar -czvf "${ARCHIVE_NAME}" "$BINARY_NAME"
            fi
          
            # Save the full path of the archive to GitHub environment variables
            echo "ARCHIVE_PATH=fyne-cross/bin/${{ matrix.goos }}-${{ matrix.goarch }}/$ARCHIVE_NAME" >> $GITHUB_ENV
          fi

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true