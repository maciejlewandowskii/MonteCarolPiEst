name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Cross-compile for these operating systems and architectures
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    env:
      APP_NAME: MontecarloPiEstimator

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Download Dependencies
        run: go mod download

      - name: Install Fyne Cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build with Fyne Cross
        run: |
          fyne-cross ${{ matrix.goos }} -arch=${{ matrix.goarch }} -app-id com.example.${{ env.APP_NAME }} -name ${{ env.APP_NAME }}

      - name: Package Artifacts
        run: |
          # 1. Determine binary name based on OS
          BINARY_NAME=${APP_NAME}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          # 2. Navigate into the output directory
          cd fyne-cross/bin/${{ matrix.goos }}-${{ matrix.goarch }}

          # 3. Package into an archive (Zip for Windows, Tar.gz for Unix)
          ARCHIVE_BASE="${APP_NAME}-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE_NAME="${ARCHIVE_BASE}.zip"
            zip "${ARCHIVE_NAME}" "$BINARY_NAME"
          else
            ARCHIVE_NAME="${ARCHIVE_BASE}.tar.gz"
            tar -czvf "${ARCHIVE_NAME}" "$BINARY_NAME"
          fi

          echo "ARCHIVE_PATH=fyne-cross/bin/${{ matrix.goos }}-${{ matrix.goarch }}/$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true # Auto-generates changelog based on PRs